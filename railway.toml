# Railway service config, shared by all three services (worker,
# predict-loop, dashboard) built from this same repo/Dockerfile. Which
# process actually runs is chosen at container start by SERVICE_ROLE (see
# docker-entrypoint.sh), not by startCommand here -- Railway's CLI has no
# clean per-service startCommand override, so the image is made role-aware
# instead. Schema changes only via Alembic migrations run as a release
# step before any of the three starts.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "alembic upgrade head"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Exactly one replica, always. Two live instances would both reconcile
# against the same broker account and could race on order submission --
# the startup reconciliation (engine.execution.reconcile) assumes a single
# writer. Do not raise this without redesigning for concurrent instances.
numReplicas = 1
