services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: engine
      POSTGRES_DB: trading_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine -d trading_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://engine:engine@postgres:5432/trading_engine
      ENVIRONMENT: development
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python", "-m", "engine.cli.main", "papertrade"]

volumes:
  postgres_data:
